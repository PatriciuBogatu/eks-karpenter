# Karpenter v1 NodePool — the scheduling/provisioning rules.
# apiVersion is karpenter.sh/v1. This single "default" pool lets Karpenter pick
# spot OR on-demand (spot is cheaper; on-demand is the fallback when spot is
# unavailable). Phase 5 splits this into dedicated on-demand vs spot pools with
# PodDisruptionBudgets to demo spot interruption properly.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
      # Recycle nodes after 30 days so they pick up fresh AMIs/patches.
      expireAfter: 720h
  disruption:
    # Remove empty nodes and pack underutilized ones together to save cost.
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    # Safety cap so a runaway workload can't provision unlimited EC2.
    cpu: "20"
